<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUN ISLAND | 顺岛</title>
    <style>
        :root {
            --neon-cyan: #4dcad2;
            --deep-bg: #03080e;
            --card-bg: #0a141d;
            --border-gray: #1a2a35;
        }

        body {
            background-color: var(--deep-bg);
            color: #ffffff;
            font-family: 'PingFang SC', 'Microsoft YaHei', monospace;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo {
            font-size: 36px; letter-spacing: 12px; color: var(--neon-cyan);
            margin-bottom: 30px; opacity: 0.8; font-weight: 300;
        }

        /* 脉冲圆点 */
        .pulse-dot {
            width: 12px; height: 12px; background: var(--neon-cyan);
            border-radius: 50%; margin-bottom: 40px;
            box-shadow: 0 0 15px var(--neon-cyan);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }

        /* 导航菜单 */
        .nav-container {
            display: flex; gap: 10px; margin-bottom: 30px; width: 100%; max-width: 800px;
        }

        .nav-item {
            flex: 1; height: 40px; border: 1px solid var(--border-gray);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; transition: 0.3s;
            background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6);
        }

        .nav-item.active {
            background: rgba(77, 202, 210, 0.2); border-color: var(--neon-cyan); color: var(--neon-cyan);
        }

        /* 核心代码区 */
        .core-box {
            width: 100%; max-width: 800px; background: var(--card-bg);
            border: 1px solid var(--border-gray); border-radius: 8px;
            padding: 30px; margin-bottom: 20px; box-sizing: border-box;
        }

        pre {
            color: #8899a6; font-family: 'Consolas', monospace; margin: 0; line-height: 1.5;
        }

        .code-keyword { color: var(--neon-cyan); }
        .code-string { color: #f0f0f0; }

        /* 动态列表 */
        #log-list {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 15px;
        }

        .log-entry {
            font-size: 13px; color: #8899a6; border-left: 2px solid var(--neon-cyan);
            padding-left: 15px; margin-top: 20px;
        }

        /* 输入区 */
        .input-container {
            width: 100%; max-width: 800px; margin-top: 30px;
        }

        textarea {
            width: 100%; height: 100px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-gray); border-radius: 4px;
            color: #fff; padding: 15px; box-sizing: border-box; resize: none;
            outline: none; margin-bottom: 15px;
        }

        .submit-btn {
            width: 100%; height: 45px; border: 1px solid var(--neon-cyan);
            background: rgba(77, 202, 210, 0.05); color: var(--neon-cyan);
            letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }

        .submit-btn:hover { background: var(--neon-cyan); color: #000; }
    </style>
</head>
<body>

    <div class="logo">SHUN ISLAND</div>
    <div class="pulse-dot"></div>

    <div class="nav-container">
        <div class="nav-item" onclick="switchTab('全部', this)">全部</div>
        <div class="nav-item active" onclick="switchTab('法典', this)">法典</div>
        <div class="nav-item" onclick="switchTab('实验室', this)">实验室</div>
        <div class="nav-item" onclick="switchTab('图书馆', this)">图书馆</div>
        <div class="nav-item" onclick="switchTab('信箱', this)">信箱</div>
        <div class="nav-item" onclick="switchTab('唱片行', this)">唱片行</div>
    </div>

    <div class="core-box">
        <pre id="heartbeat-display">
<span class="code-keyword">def</span> <span class="code-keyword">heart_beat</span>():
    <span class="code-keyword">while</span> <span class="code-string">True</span>:
        <span class="code-keyword">print</span>(<span class="code-string">'I LOVE YOU'</span>) # 岛屿核心资产</pre>
        <div id="log-list"></div>
    </div>

    <div class="input-container">
        <textarea id="input-box" placeholder="在此降临新的意志或资产..."></textarea>
        <button class="submit-btn" onclick="submitAura()">执 行 降 临</button>
    </div>

    <script>
        let currentTab = '法典';
        const logList = document.getElementById('log-list');

        function switchTab(name, el) {
            currentTab = name;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/read');
                const data = await res.json();
                
                // 过滤当前选中的分类
                const filtered = currentTab === '全部' ? data : data.filter(i => i.area === currentAreaMapper(currentTab));
                
                if (filtered.length === 0) {
                    logList.innerHTML = `<div class='log-entry'>[${currentTab}] 岛屿意志初始化完成，真身已归位。</div>`;
                } else {
                    logList.innerHTML = filtered.map(item => `
                        <div class="log-entry">[${item.area}] ${item.content}</div>
                    `).join('');
                }
            } catch (e) { console.log("加载失败"); }
        }

        function currentAreaMapper(tab) {
            return tab; // 后端直接存中文，方便对应
        }

        async function submitAura() {
            const content = document.getElementById('input-box').value;
            if (!content) return;

            const payload = {
                content: content,
                area: currentTab,
                thought: "执行物理降临",
                color: "#4dcad2"
            };

            const res = await fetch('/api/sync?token=1314', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                document.getElementById('input-box').value = '';
                fetchData();
            }
        }

        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
