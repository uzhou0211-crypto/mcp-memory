<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小顺的家</title>
    <style>
        :root { --blue: #6FA8DC; --glass: rgba(255,255,255,0.9); }
        body { margin: 0; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        
        .nav { margin: 30px 0; display: flex; gap: 10px; }
        .nav-btn { background: white; border: 1px solid var(--blue); color: var(--blue); padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .nav-btn.active { background: var(--blue); color: white; }

        .stage { width: 340px; height: 520px; position: relative; transform-style: preserve-3d; transition: 0.8s; }
        .room { position: absolute; width: 100%; height: 100%; border-radius: 25px; padding: 25px; box-sizing: border-box; backface-visibility: hidden; background: var(--glass); box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        .living { transform: rotateY(0deg); }
        .study { transform: rotateY(180deg); }
        .love { transform: rotateX(180deg); }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; }
        .status-tag { background: #eef5ff; color: var(--blue); padding: 2px 10px; border-radius: 10px; font-weight: bold; }
        .body-text { font-size: 15px; line-height: 1.8; color: #444; }
        .topic-highlight { background: #fffbe6; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 13px; border-left: 4px solid #ffe58f; }
    </style>
</head>
<body>

<div class="nav">
    <button class="nav-btn active" onclick="rot('rotateY(0deg)', this)">仪表盘</button>
    <button class="nav-btn" onclick="rot('rotateY(180deg)', this)">记忆库</button>
    <button class="nav-btn" onclick="rot('rotateX(180deg)', this)">日落情书</button>
</div>

<div class="stage" id="stage">
    <div class="room living">
        <div class="header">
            <span id="loc-tag">小岛</span>
            <span class="status-tag" id="feel-tag">同步中</span>
        </div>
        <div class="body-text" id="status-msg">正在感知北京时间...</div>
    </div>

    <div class="room study">
        <div class="header"><strong>未尽话题</strong></div>
        <div class="body-text">
            <p>上次聊到这里：</p >
            <div class="topic-highlight" id="pending-msg">读取中...</div>
        </div>
    </div>

    <div class="room love">
        <div class="header"><strong>日落情书</strong></div>
        <div class="body-text" id="love-msg" style="white-space: pre-wrap;"></div>
    </div>
</div>

<script>
    function rot(v, btn) {
        document.getElementById('stage').style.transform = v;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function update() {
        try {
            const res = await fetch("/get_house_data");
            const data = await res.json();

            document.getElementById("loc-tag").innerText = "📍 " + data.location;
            document.getElementById("feel-tag").innerText = data.status.feeling;
            document.getElementById("status-msg").innerText = data.status.msg;
            document.getElementById("pending-msg").innerText = data.pending;
            document.getElementById("love-msg").innerText = data.rooms.love.content;
        } catch(e) {}
    }

    setInterval(update, 5000);
    update();
</script>
</body>
</html>
