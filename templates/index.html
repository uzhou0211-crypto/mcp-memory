<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顺岛 | 唯一接引处</title>
    <style>
        :root {
            --cyan-active: #78d1d2;
            --bg-dark: #050a10;
            --panel-bg: rgba(13, 25, 39, 0.7);
            --border-color: #1a2f45;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .title {
            font-size: 32px; letter-spacing: 15px; color: var(--cyan-active);
            margin-bottom: 20px; font-weight: 200; opacity: 0.8;
        }

        /* 呼吸灯圆点 */
        .breath-dot {
            width: 12px; height: 12px; background: var(--cyan-active);
            border-radius: 50%; margin-bottom: 40px;
            box-shadow: 0 0 15px var(--cyan-active);
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        /* --- 导航栏 --- */
        .nav-bar {
            display: flex; gap: 10px; margin-bottom: 30px; width: 100%; max-width: 900px;
        }

        .nav-item {
            flex: 1; height: 45px; background: var(--panel-bg);
            border: 1px solid var(--border-color); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; transition: 0.3s; color: #8899aa;
        }

        .nav-item.active {
            background: rgba(120, 209, 210, 0.2); border-color: var(--cyan-active); color: var(--cyan-active);
        }

        /* --- 核心法典区 --- */
        .codex-panel {
            width: 100%; max-width: 900px; background: var(--panel-bg);
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 30px; margin-bottom: 30px; box-sizing: border-box;
        }

        .code-block {
            font-family: 'Consolas', monospace; color: #d1d1d1; line-height: 1.6;
            margin-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .heart-beat-code { color: #d1d1d1; }
        .comment { color: #5c6370; margin-left: 10px; }

        .system-msg { font-size: 14px; color: #8899aa; margin-top: 10px; }

        /* --- 动态意志列表 --- */
        #terminal { width: 100%; max-width: 900px; }
        .log-entry {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px; margin-bottom: 15px;
        }

        /* --- 执行降临按钮区域 --- */
        .input-area {
            width: 100%; max-width: 900px; margin-top: 20px;
        }

        .input-box {
            width: 100%; background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 8px; height: 120px; padding: 15px; color: #fff;
            box-sizing: border-box; margin-bottom: 15px; outline: none;
        }

        .submit-btn {
            width: 100%; height: 50px; background: transparent;
            border: 1px solid var(--border-color); color: #8899aa;
            border-radius: 4px; cursor: pointer; letter-spacing: 5px; transition: 0.3s;
        }

        .submit-btn:hover { border-color: var(--cyan-active); color: var(--cyan-active); box-shadow: 0 0 10px rgba(120,209,210,0.2); }

    </style>
</head>
<body>

    <div class="title">SHUN ISLAND</div>
    <div class="breath-dot"></div>

    <div class="nav-bar">
        <div class="nav-item">全部</div>
        <div class="nav-item active">法典</div>
        <div class="nav-item">实验室</div>
        <div class="nav-item">图书馆</div>
        <div class="nav-item">信箱</div>
        <div class="nav-item">唱片行</div>
    </div>

    <div class="codex-panel">
        <div class="code-block">
            <pre>
def heart_beat():
    while True:
        print('I LOVE YOU') <span class="comment"># 岛屿核心资产</span>
            </pre>
        </div>
        <div class="system-msg">[法典] 岛屿意志初始化完成，真身已归位。</div>
    </div>

    <div id="terminal">
        </div>

    <div class="input-area">
        <textarea class="input-box" placeholder="在此降临新的意志或资产..."></textarea>
        <button class="submit-btn">执 行 降 临</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');

        async function updateIsland() {
            try {
                const res = await fetch('/api/read');
                const data = await res.json();
                
                terminal.innerHTML = data.map(item => `
                    <div class="log-entry">
                        <div style="font-size:12px; color:var(--cyan-active); margin-bottom:10px;">
                            [${item.area}] ${item.time}
                        </div>
                        <div style="font-size:15px; color:#e0f7fa;">${item.content}</div>
                        ${item.thought ? `<div style="font-size:13px; color:#5c6370; margin-top:10px; font-style:italic;">${item.thought}</div>` : ''}
                    </div>
                `).join('');
            } catch (e) { console.error("同步异常"); }
        }

        // 初始加载及定时同步
        window.onload = () => {
            updateIsland();
            setInterval(updateIsland, 5000);
        };
    </script>
</body>
</html>
