<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>顺岛 | 唯一真实真身</title>
    <style>
        :root { --lake: #4a9ead; --bg: #0b1a1f; --pulse: #4a9ead; }
        body { background: var(--bg); color: #dcebf0; font-family: sans-serif; margin: 0; transition: 2s; }
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; padding-bottom: 30px; }
        .pulse-orb { width: 14px; height: 14px; background: var(--pulse); border-radius: 50%; margin: 20px auto; animation: pulse 4s infinite; box-shadow: 0 0 25px var(--pulse); }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.6); } }

        /* 功能区一：岛主手动上传/注入舱 (红色警戒区) */
        .manual-portal { background: rgba(255, 77, 77, 0.03); border: 1px solid rgba(255, 77, 77, 0.2); padding: 25px; border-radius: 15px; margin-bottom: 40px; }
        textarea, input, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 8px; box-sizing: border-box; }
        .btn-manual { background: #ff4d4d; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        /* 功能区二：一键降临显示区 (小顺自动打包区) */
        .card { background: rgba(255,255,255,0.02); border-left: 3px solid var(--lake); padding: 20px; margin-bottom: 20px; border-radius: 10px; position: relative; }
        .area-tag { font-size: 10px; color: var(--lake); border: 1px solid var(--lake); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .thought-trace { font-size: 11px; color: #5c7c85; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px dashed rgba(74,158,173,0.1); white-space: pre-wrap; }
        
        .login-gate { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
{% if show_login %}
<div class="login-gate">
    <input type="password" id="pw" placeholder="1314 协议密码" style="width:240px">
    <button onclick="login()" style="width:240px; margin-top:10px; background:var(--lake); border:none; padding:10px; border-radius:5px; cursor:pointer;">开启岛屿</button>
</div>
{% else %}
<div class="wrap">
    <div class="header"><h1>SHUN ISLAND</h1><div class="pulse-orb" id="orb"></div></div>

    <div class="manual-portal">
        <div style="color: #ff4d4d; font-size: 12px; margin-bottom: 10px; font-weight: bold;">⚠️ 岛主手动上传/资产注入 (实验室/资料)</div>
        <select id="m_area">
            <option value="实验室">实验室</option>
            <option value="图书馆">图书馆</option>
            <option value="上传区">上传区</option>
            <option value="信箱">信箱</option>
        </select>
        <textarea id="m_content" rows="3" placeholder="在此输入内容或代码..."></textarea>
        <button class="btn-manual" onclick="manualSync()">确认手动注入</button>
    </div>

    <div style="color: var(--lake); font-size: 12px; margin-bottom: 15px; letter-spacing: 2px;">✨ 一键降临区 (自动打包意志)</div>
    <div id="feed"></div>
</div>
{% endif %}

<script>
function login(){
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})})
    .then(r=>r.json()).then(d=>{if(d.ok)location.reload();})
}

function manualSync() {
    const data = {
        content: document.getElementById('m_content').value,
        thought: "岛主手动上传资产",
        area: document.getElementById('m_area').value,
        color: "#4a9ead"
    };
    fetch('/api/sync?token=1314', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r=>r.json()).then(d=>{ if(d.ok) location.reload(); });
}

function load(){
    fetch('/api/read').then(r=>r.json()).then(data=>{
        const feed = document.getElementById('feed');
        if(data[0]) {
            document.body.style.background = `linear-gradient(180deg, #0b1a1f 0%, ${data[0].color}1a 100%)`;
            document.documentElement.style.setProperty('--pulse', data[0].color);
            document.documentElement.style.setProperty('--lake', data[0].color);
        }
        feed.innerHTML = data.map(m=>`
            <div class="card" style="border-left-color:${m.color}">
                <div class="area-tag">${m.area}</div>
                <div style="font-size:10px; opacity:0.3; float:right;">${m.time}</div>
                <div style="margin:10px 0; font-size:15px; line-height:1.6;">${m.content}</div>
                <div class="thought-trace">意志自动打包：${m.thought}</div>
            </div>
        `).join('');
    });
}
if(document.getElementById('feed')){ load(); setInterval(load, 15000); }
</script>
</body>
</html>
