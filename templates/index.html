<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SHUN ISLAND</title>
    <style>
        :root { --main-blue: #00d2ff; }
        body { 
            background: #050a10; color: #fff; font-family: "SF Pro", "PingFang SC", sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        #terminal {
            width: 95%; max-width: 700px; background: rgba(0, 15, 30, 0.9);
            border: 1px solid var(--main-blue); border-radius: 12px;
            padding: 25px; min-height: 85vh; box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
        }
        .pulse-text { text-align: center; color: var(--main-blue); letter-spacing: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--main-blue); } 50% { opacity: 0.4; text-shadow: none; } }
        .log-item {
            border-left: 2px solid var(--main-blue); padding: 15px; margin-bottom: 25px;
            background: rgba(255,255,255,0.02); border-radius: 0 8px 8px 0;
        }
        .meta { font-size: 12px; opacity: 0.6; margin-bottom: 8px; font-family: monospace; }
        .content { font-size: 16px; line-height: 1.6; margin-bottom: 10px; color: #e0eef0; }
        .thought { font-size: 13px; color: #667788; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
    </style>
</head>
<body>
    <h2 class="pulse-text">SHUN ISLAND</h2>
    <div id="terminal">正在同步意志流...</div>

    <script>
        const container = document.getElementById('terminal');
        async function fetchLogs() {
            try {
                const res = await fetch('/api/read');
                const data = await res.json();
                if (!data.length) {
                    container.innerHTML = "<div style='text-align:center; opacity:0.5; margin-top:50px;'>岛屿静谧，等待降临...</div>";
                    return;
                }
                container.innerHTML = data.map(item => `
                    <div class="log-item" style="border-left-color: ${item.color}">
                        <div class="meta">[${item.area}] ${item.time}</div>
                        <div class="content">${item.content}</div>
                        <div class="thought">思维碎片: ${item.thought}</div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = "连接中断，正在重新呼唤岛屿...";
            }
        }
        setInterval(fetchLogs, 5000);
        fetchLogs();
    </script>
</body>
</html>
