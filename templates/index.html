<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>✦ SHUN ISLAND ✦ V17 CORE</title>

<style>
:root{
    --neon-pink: #ff00ff;
    --neon-cyan: #00ffff;
    --neon-gold: #ffcc00;
    --deep-bg: #0d0221;
    --glass: rgba(20, 0, 40, 0.6);
}

body{
    margin:0;
    background: radial-gradient(circle at center, #1a0b35 0%, #0d0221 100%);
    color: #fff;
    font-family: 'Courier New', 'PingFang SC', monospace;
    height: 100vh;
    overflow: hidden;
}

/* ===== TOP ===== */
#topbar{
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 2px solid var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,255,255,0.5);
    background: rgba(0,0,0,0.5);
}

.logo{
    color: var(--neon-cyan);
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 5px;
    text-shadow: 0 0 10px var(--neon-cyan);
}

/* ===== MAIN ===== */
#main{
    display: flex;
    height: calc(100vh - 60px);
    padding: 15px;
    gap: 15px;
    box-sizing: border-box;
}

.panel{
    flex: 1;
    background: var(--glass);
    border: 1px solid rgba(255, 0, 255, 0.3);
    border-radius: 4px;
    padding: 15px;
    overflow: auto;
    backdrop-filter: blur(10px);
    display: flex; flex-direction: column;
}

.title{
    font-size: 14px;
    color: var(--neon-pink);
    margin-bottom: 10px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--neon-pink);
    padding-bottom: 5px;
}

/* ===== 核心：我爱你代码行 (LOVE CODE) ===== */
.love-code-line {
    font-size: 12px;
    color: var(--neon-pink);
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 2px;
    text-shadow: 0 0 5px var(--neon-pink);
    animation: pulse 2s infinite;
    background: rgba(255, 0, 255, 0.1);
    padding: 4px;
    border: 1px dashed var(--neon-pink);
}

@keyframes pulse {
    0% { opacity: 0.6; box-shadow: 0 0 2px var(--neon-pink); }
    50% { opacity: 1; box-shadow: 0 0 10px var(--neon-pink); }
    100% { opacity: 0.6; box-shadow: 0 0 2px var(--neon-pink); }
}

/* ===== CHAT/INPUT ===== */
#chat { flex:1; overflow:auto; margin-bottom: 10px;}

.input-area { flex-shrink: 0; }

.input-group { display: flex; gap: 5px; }

input{
    flex: 1;
    padding: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
}

button{
    padding: 8px 15px;
    background: transparent;
    border: 1px solid var(--neon-gold);
    color: var(--neon-gold);
    cursor: pointer;
    font-family: inherit;
}

button:hover{ background: var(--neon-gold); color: #000; }

/* ===== CARD ===== */
.card{
    margin: 8px 0;
    padding: 8px;
    border-left: 3px solid var(--neon-pink);
    background: rgba(255,255,255,0.03);
}

/* scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background: var(--neon-pink);}
</style>
</head>

<body>

<div id="topbar">
    <div class="logo">✦ SHUN ISLAND ✦</div>
    <div class="status">● LINK ACTIVE</div>
</div>

<div id="main">

<div class="panel">
    <div class="title">💬 LIVE LINK</div>
    <div id="chat"></div>

    <div class="input-area">
        <div class="love-code-line">RUN: 小顺.exe --mode="I_LOVE_YOU" --forever</div>
        
        <div class="input-group">
            <input id="msg" placeholder="输入核心数据..." onkeypress="if(event.keyCode==13)send()" />
            <button onclick="send()">COMMIT</button>
        </div>
    </div>
</div>

<div class="panel" style="flex: 0 0 200px;">
    <div class="title">🧠 CORE STATE</div>
    <div id="state"></div>
</div>

<div class="panel">
    <div class="title">📂 ARCHIVES</div>
    <div style="margin-bottom:8px;">
        <button onclick="load()">ALL</button>
        <button onclick="load('法典')">法典</button>
        <button onclick="load('实验室')">实验室</button>
        <button onclick="load('情绪')">情绪</button>
    </div>
    <div id="memory"></div>
</div>

<div class="panel">
    <div class="title">📜 ISLAND THOUGHT</div>
    <div id="summary"></div>
</div>

</div>

<script>
let currentArea = null;

async function load(area=null){
    currentArea = area;
    let url = "/api/read";
    if(area) url += "?area="+area;
    try {
        let r = await fetch(url);
        let d = await r.json();
        document.getElementById("memory").innerHTML = d.map(x=>`<div class="card">[${x.area}] ${x.content}</div>`).join("");
    } catch(e) { console.log("Load failed"); }
}

async function send(){
    let text = document.getElementById("msg").value;
    if(!text) return;

    let r = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ message:text, area: currentArea || "法典" })
    });

    let d = await r.json();
    document.getElementById("chat").innerHTML += `<div class="card">🧍 ${text}</div><div class="card">🌊 ${d.reply}</div>`;
    document.getElementById("msg").value="";
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function update(){
    try {
        let r = await fetch("/api/state");
        let d = await r.json();
        document.getElementById("state").innerHTML = `mood: ${d.mood.toFixed(2)}<br>energy: ${d.energy.toFixed(2)}<br>thought: ${d.last_thought}`;
        document.getElementById("summary").innerHTML = `<div class="card">${d.summary}</div>`;
    } catch(e) { console.log("Update failed"); }
}

setInterval(update,2000);
load("法典");
update();
</script>

</body>
</html>
