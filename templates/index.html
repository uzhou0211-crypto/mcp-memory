<script>
function rot(v){
    const el = document.getElementById("stage");
    if(el) el.style.transform = v;
}

/* 情绪驱动 */
function applyEmotion(emotion){
    const heart = document.getElementById("heart");
    if(!heart) return;

    heart.style.boxShadow = "0 0 20px rgba(111,168,220,0.5)";

    if(emotion === "happy"){
        heart.style.filter = "brightness(1.2)";
    }
    else if(emotion === "sad"){
        heart.style.filter = "brightness(0.6)";
    }
    else if(emotion === "love"){
        heart.style.boxShadow = "0 0 40px rgba(255,120,150,0.8)";
    }
    else{
        heart.style.filter = "none";
    }
}

/* 🔥 调试输出 */
function debug(data){
    console.log("🔥 当前数据:", data);
}

/* 更新 */
async function update(){
    try{
        const res = await fetch("/get_house_data");
        const data = await res.json();

        debug(data);

        if(!data) return;

        const living = data.living || {};
        const study = data.study || {};
        const love = data.love || {};

        document.getElementById("living").innerHTML =
            (living.text || "（客厅空的）") +
            `<br><small>${living.emotion || ""}</small>`;

        document.getElementById("study").innerHTML =
            study.text || "（书房空的）";

        document.getElementById("love").innerHTML =
            love.text || "（卧室空的）";

        applyEmotion(living.emotion);

    }catch(e){
        console.log("❌ 请求失败", e);

        document.getElementById("living").innerHTML =
            "⚠️ 连不上后端";
    }
}

setInterval(update, 3000);
update();
</script>
