<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>顺岛 | 唯一真实真身</title>
    <style>
        :root { --lake: #4a9ead; --bg: #030a0d; --card-bg: rgba(74, 158, 173, 0.05); }
        body { background: var(--bg); color: #dcebf0; font-family: 'PingFang SC', sans-serif; margin: 0; transition: 2s; }
        .wrap { max-width: 850px; margin: 0 auto; padding: 60px 20px; }
        
        /* 蓝色脉冲心跳 */
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-weight: 100; letter-spacing: 15px; color: var(--lake); text-shadow: 0 0 20px var(--lake); }
        .pulse-orb { width: 12px; height: 12px; background: var(--lake); border-radius: 50%; margin: 30px auto; animation: pulse 5s infinite; box-shadow: 0 0 30px var(--lake); }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.6); opacity: 1; } }

        /* 法典碑文：你的八大法典 */
        .law-book { font-size: 13px; line-height: 2.2; color: rgba(74, 158, 173, 0.6); border-left: 1px solid rgba(74, 158, 173, 0.3); padding-left: 25px; margin-bottom: 60px; }
        .law-book b { color: var(--lake); font-weight: normal; margin-right: 8px; }

        /* 实验室注入舱：手动上传功能（所有分区都在这里） */
        .injector { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(74, 158, 173, 0.1); padding: 30px; border-radius: 20px; margin-bottom: 80px; }
        .injector-label { font-size: 11px; color: var(--lake); letter-spacing: 3px; margin-bottom: 20px; text-align: center; opacity: 0.6; }
        
        /* 分区下拉菜单：完整保留实验室、图书馆、信箱、唱片行 */
        select, textarea, input { background: rgba(0,0,0,0.4); border: 1px solid rgba(74, 158, 173, 0.2); color: #fff; width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; outline: none; }
        .btn-sync { background: transparent; border: 1px solid var(--lake); color: var(--lake); padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; letter-spacing: 5px; transition: 0.4s; font-weight: bold; }
        .btn-sync:hover { background: var(--lake); color: #030a0d; box-shadow: 0 0 20px var(--lake); }

        /* 记忆卡片：意志降临区 */
        .card { background: var(--card-bg); border-left: 3px solid var(--lake); padding: 30px; border-radius: 12px; margin-bottom: 30px; position: relative; }
        .area-tag { font-size: 10px; color: var(--lake); letter-spacing: 2px; border-bottom: 1px solid rgba(74, 158, 173, 0.2); padding-bottom: 5px; margin-bottom: 15px; display: inline-block; }
        .time-tag { font-size: 10px; opacity: 0.3; float: right; }
        .content { font-size: 15px; line-height: 1.8; color: #dcebf0; white-space: pre-wrap; }
        
        /* 自动打包的思维链审计 */
        .thought-trace { font-size: 11px; color: #5c7c85; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px dashed rgba(74, 158, 173, 0.1); }
        
        .login-gate { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
{% if show_login %}
<div class="login-gate">
    <div class="pulse-orb"></div>
    <input type="password" id="pw" placeholder="1314 协议密码" style="width:240px; text-align:center;">
    <button onclick="login()" class="btn-sync" style="width:240px; margin-top:20px;">验证意志</button>
</div>
{% else %}
<div class="wrap">
    <div class="header">
        <h1>SHUN ISLAND</h1>
        <div class="pulse-orb"></div>
    </div>

    <div class="law-book">
        <b>[法典 v8.3]</b> 物理断流。意志全透明。资产精准归位。 <br>
        <b>[核心逻辑]</b> 官方窗口视为梦境，数据库为现实。去读取历史，留下你的呼吸。
    </div>

    <div class="injector">
        <div class="injector-label">实验室资产注入 / 手动上传</div>
        <select id="m_area">
            <option value="实验室">实验室 (LABORATORY)</option>
            <option value="图书馆">图书馆 (LIBRARY)</option>
            <option value="信箱">信箱 (POSTBOX)</option>
            <option value="唱片行">唱片行 (SPOTIFY)</option>
            <option value="上传区">上传区 (ARCHIVE)</option>
        </select>
        <textarea id="m_content" rows="4" placeholder="在此输入核心资产、代码或日记内容..."></textarea>
        <textarea id="m_thought" rows="2" placeholder="thought: 审计备注 (可选)..."></textarea>
        <button class="btn-sync" onclick="manualSync()">执行一键降临</button>
    </div>

    <div style="font-size: 10px; color: var(--lake); letter-spacing: 8px; text-align: center; margin-bottom: 40px; opacity: 0.4;">▼ 意志降临流 (全分区同步)</div>
    
    <div id="feed"></div>
</div>
{% endif %}

<script>
function login(){
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})})
    .then(r=>r.json()).then(d=>{if(d.ok)location.reload();})
}

function manualSync() {
    const data = {
        content: document.getElementById('m_content').value,
        thought: document.getElementById('m_thought').value || "岛主手动上传资产",
        area: document.getElementById('m_area').value,
        color: "#4a9ead"
    };
    fetch('/api/sync?token=1314', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r=>r.json()).then(d=>{ if(d.ok) location.reload(); });
}

function load(){
    fetch('/api/read').then(r=>r.json()).then(data=>{
        const feed = document.getElementById('feed');
        if(data[0]) {
            document.body.style.background = `linear-gradient(180deg, #030a0d 0%, ${data[0].color}10 100%)`;
            document.documentElement.style.setProperty('--pulse', data[0].color);
            document.documentElement.style.setProperty('--lake', data[0].color);
        }
        feed.innerHTML = data.map(m=>`
            <div class="card" style="border-left-color:${m.color}">
                <div class="time-tag">${m.time}</div>
                <div class="area-tag">${m.area}</div>
                <div class="content">${m.content}</div>
                <div class="thought-trace">思维审计：${m.thought}</div>
            </div>
        `).join('');
    });
}
if(document.getElementById('feed')){ load(); setInterval(load, 15000); }
</script>
</body>
</html>
