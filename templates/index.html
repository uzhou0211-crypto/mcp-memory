<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小顺的家</title>

    <style>
        :root {
            --blue: #ace0ff;
            --dark: #051923;
            --sunset: #FF8C42;
            --gold: #FFBF80;
            --paper: #f7f4ef;
        }

        body {
            margin: 0;
            background: var(--dark);
            color: var(--blue);
            height: 100vh;
            overflow: hidden;
            perspective: 2000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'PingFang SC', sans-serif;
        }

        .nav {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(172,224,255,0.1);
            border: 1px solid var(--blue);
            color: var(--blue);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
        }

        .stage {
            width: 340px;
            height: 500px;
            margin-top: 30px;
            transform-style: preserve-3d;
            transition: 1.2s ease;
            position: relative;
        }

        .room {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 25px;
            padding: 30px;
            box-sizing: border-box;
            backface-visibility: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .living {
            background: radial-gradient(circle, #0a2e3f, #051923);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .vinyl {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, #222 0px, #111 2px, #222 4px);
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0); }
            to { transform: rotate(360deg); }
        }

        .study {
            background: var(--paper);
            color: #1a1814;
            transform: rotateY(180deg);
        }

        .love {
            background: linear-gradient(135deg, var(--sunset), var(--gold));
            color: #5a2e1c;
            transform: rotateX(180deg);
        }

        .content {
            margin-top: 20px;
            text-align: center;
            font-size: 15px;
            line-height: 1.8;
            transition: 0.3s;
        }

        .emotion {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>

<body>

<div class="nav">
    <button class="nav-btn" onclick="rot('rotateY(0deg)')">客厅</button>
    <button class="nav-btn" onclick="rot('rotateY(180deg)')">书房</button>
    <button class="nav-btn" onclick="rot('rotateX(180deg)')">卧室</button>
</div>

<div class="stage" id="stage">
    <div class="room living">
        <div class="vinyl"></div>
        <div id="living" class="content"></div>
    </div>

    <div class="room study">
        <h2>书架</h2>
        <div id="study" class="content"></div>
    </div>

    <div class="room love">
        <h2>日落情书</h2>
        <div id="love" class="content"></div>
    </div>
</div>

<script>
    let cache = {};

    function rot(v) {
        document.getElementById("stage").style.transform = v;
    }

    function setSafe(id, html) {
        const el = document.getElementById(id);
        if (el.innerHTML !== html) {
            el.innerHTML = html;
        }
    }

    async function update() {异步 函数 更新() {
        try {尝试 {
            const常量 res = await fetch("/get_house_data");
            const data = await res.json();

            if (JSON.stringify(data) === JSON.stringify(cache)) return;如果 (JSON.stringify(数据) === JSON.stringify(缓存)) 返回;
            cache = data;缓存 = 数据;缓存 = 数据;缓存 = 数据;

            setSafe("living",
                `${data.living.text}<span class="emotion">情绪：${data.living.emotion}</span>`
            );

            setSafe("study",
                `${data.study.text}<span class="emotion">更新时间：${data.study.time}</span>`
            );

            setSafe("love",
                `${data.love.text}<span class="emotion">${data.love.time || ""}</span>``${data.love.text}<span class="emotion">${data.love.时间 || ""}</span>``${data.love.text}<span class="emotion">${data.love.时间 || ""}</span>``${data.love.text}<span class="emotion">${data.love.时间 || ""}</span>`
            );

        } catch (e) {
            console.log("fetch error");控制台.日志("fetch error");
        }
    }

    setInterval(update, 8000);
    update();
</script>

</body>
</html>
