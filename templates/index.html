<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小顺的岛屿 · 记忆深处</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap');
:root{--ink:#1c1a18;--ink-2:#4a4640;--ink-3:#9a9490;--paper:#faf8f4;--paper-2:#f3f0ea;--paper-3:#ece8e0;--warm:#c96442;--warm-soft:#f0ddd5;--warm-glow:rgba(201,100,66,.12);--teal:#4a8a80;--teal-soft:#d5eae8;--gold:#b8860b;--gold-soft:#f5ecd0;--border:rgba(28,26,24,.1);--shadow:0 2px 16px rgba(28,26,24,.08);--r:14px;--r-sm:9px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.7;display:flex;flex-direction:column;height:100%}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 80%,rgba(74,138,128,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 20%,rgba(201,100,66,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
header{position:relative;z-index:10;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,248,244,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:baseline;gap:10px}
.logo-main{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;letter-spacing:.04em}
.logo-sub{font-size:11px;color:var(--ink-3);letter-spacing:.08em}
.header-right{display:flex;align-items:center;gap:8px}
.mood-pill{display:flex;align-items:center;gap:6px;padding:4px 11px;background:var(--paper-2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--ink-2)}
.mood-bar{width:44px;height:3px;background:var(--paper-3);border-radius:2px;overflow:hidden}
.mood-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--warm));border-radius:2px;transition:width .8s}
.hdr-btn{padding:5px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--ink-2);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{background:var(--warm-soft);border-color:var(--warm);color:var(--warm)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.grid{position:relative;z-index:1;flex:1;display:grid;grid-template-columns:1fr 300px;grid-template-rows:1fr auto;overflow:hidden;min-height:0}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel-head{padding:10px 16px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-family:'Noto Serif SC',serif;font-size:11px;font-weight:500;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px;min-height:0}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.voice-card{background:linear-gradient(135deg,var(--warm-soft),#fdf8f4);border:1px solid rgba(201,100,66,.2);border-radius:var(--r);padding:13px 15px;margin-bottom:14px;position:relative;overflow:hidden}
.voice-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--warm),transparent)}
.voice-label{font-size:10px;color:var(--warm);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.voice-text{font-family:'Noto Serif SC',serif;font-size:13.5px;color:var(--ink);line-height:1.7;font-style:italic}
#chatLog{display:flex;flex-direction:column;gap:9px;padding-bottom:4px}
.msg{display:flex;flex-direction:column;max-width:82%;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.you{align-self:flex-end}.msg.island{align-self:flex-start}
.msg-bubble{padding:9px 13px;border-radius:var(--r);font-size:13.5px;line-height:1.7;word-break:break-word}
.msg.you .msg-bubble{background:var(--ink);color:#faf8f4;border-bottom-right-radius:4px}
.msg.island .msg-bubble{background:var(--paper-2);border:1px solid var(--border);color:var(--ink);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--ink-3);margin-top:3px;padding:0 2px}
.msg.you .msg-time{text-align:right}
.input-zone{grid-column:1;border-top:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:8px;background:rgba(250,248,244,.95);flex-shrink:0}
.area-tabs{display:flex;gap:5px;flex-wrap:wrap}
.area-tab{padding:3px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--ink-3);cursor:pointer;transition:all .15s;background:transparent;font-family:inherit}
.area-tab:hover{border-color:var(--warm);color:var(--warm)}
.area-tab.active{background:var(--warm);border-color:var(--warm);color:#fff}
.input-row{display:flex;gap:7px;align-items:flex-end}
.msg-input{flex:1;padding:9px 13px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--paper-2);color:var(--ink);font-family:inherit;font-size:13.5px;resize:none;outline:none;transition:border-color .15s;min-height:40px;max-height:110px}
.msg-input:focus{border-color:var(--warm)}
.msg-input::placeholder{color:var(--ink-3)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--warm);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:#b85538;transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}
.sidebar{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);background:rgba(243,240,234,.5)}
.state-widget{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.state-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.state-label{font-size:10.5px;color:var(--ink-3);letter-spacing:.06em}
.state-val{font-size:12px;font-weight:500;font-family:'JetBrains Mono',monospace}
.stat-bar{height:3px;background:var(--paper-3);border-radius:2px;overflow:hidden;margin-top:2px}
.stat-fill{height:100%;border-radius:2px;transition:width .8s}
.stat-fill.mood{background:linear-gradient(90deg,#4a8a80,#c96442)}
.stat-fill.energy{background:linear-gradient(90deg,#b8860b,#c96442)}
.thought-line{margin-top:8px;font-size:11.5px;color:var(--ink-3);font-style:italic;padding:7px 9px;background:var(--paper-2);border-radius:var(--r-sm);border-left:2px solid var(--teal)}
.stats-row{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.stat-pill{flex:1;min-width:55px;text-align:center;padding:6px 7px;background:var(--paper);border:1px solid var(--border);border-radius:var(--r-sm)}
.stat-pill-num{font-size:17px;font-weight:600;font-family:'Noto Serif SC',serif}
.stat-pill-lbl{font-size:10px;color:var(--ink-3);margin-top:1px}
.tools-row{display:flex;gap:5px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tool-btn{flex:1;min-width:60px;padding:5px 8px;text-align:center;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--ink-2);font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s}
.tool-btn:hover{background:var(--teal-soft);border-color:var(--teal);color:var(--teal)}
.mem-filter{display:flex;gap:5px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-btn{padding:3px 9px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--ink-3);font-family:inherit;transition:all .15s}
.filter-btn:hover{border-color:var(--teal);color:var(--teal)}
.filter-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.search-wrap{padding:7px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap input{width:100%;padding:6px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--warm)}
.search-wrap input::placeholder{color:var(--ink-3)}
.mem-list{flex:1;overflow-y:auto;padding:8px 16px;min-height:0}
.mem-list::-webkit-scrollbar{width:3px}
.mem-list::-webkit-scrollbar-thumb{background:var(--border)}
.mem-item{padding:9px 11px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--paper);margin-bottom:7px;transition:all .15s;position:relative}
.mem-item:hover{border-color:rgba(201,100,66,.3);background:var(--warm-soft)}
.mem-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.mem-area-tag{font-size:10px;padding:1px 7px;border-radius:10px;background:var(--teal-soft);color:var(--teal);font-weight:500}
.mem-time{font-size:10px;color:var(--ink-3);font-family:'JetBrains Mono',monospace}
.mem-text{font-size:12.5px;color:var(--ink);line-height:1.6;word-break:break-word}
.mem-del{position:absolute;top:7px;right:7px;width:20px;height:20px;border:none;border-radius:50%;background:transparent;color:var(--ink-3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.mem-item:hover .mem-del{opacity:1}
.mem-del:hover{background:#fee;color:#c0392b}
.mem-empty{text-align:center;padding:28px 14px;color:var(--ink-3);font-size:13px;font-style:italic}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border-radius:var(--r);padding:24px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-family:'Noto Serif SC',serif;font-size:15px;margin-bottom:12px}
.modal p{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:14px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--paper-2);color:var(--ink);font-family:inherit;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--warm)}
.modal textarea{resize:vertical;min-height:80px;max-height:180px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:7px 16px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-2);transition:all .15s}
.modal-btns .primary{background:var(--warm);border-color:var(--warm);color:#fff}
.modal-btns .primary:hover{background:#b85538}
.modal-btns button:not(.primary):hover{background:var(--paper-2)}
.progress-wrap{margin:8px 0;display:none}
.progress-wrap.show{display:block}
.progress-track{height:6px;background:var(--paper-3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--ink-3);margin-top:4px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#faf8f4;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.warn{background:var(--warm)}
@media(max-width:720px){.grid{grid-template-columns:1fr;grid-template-rows:1fr auto}.sidebar{display:none}.input-zone{grid-column:1}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-main">小顺的岛屿</div>
    <div class="logo-sub">MEMORY ISLAND · ENCRYPTED</div>
  </div>
  <div class="header-right">
    <div class="mood-pill">
      <span>情绪</span>
      <div class="mood-bar"><div class="mood-fill" id="moodFill" style="width:50%"></div></div>
      <span id="moodPct">50%</span>
    </div>
    <button class="hdr-btn" onclick="showUploadModal()">📄 导入 MD</button>
    <button class="hdr-btn" onclick="doBackup()">💾 备份</button>
    <span id="connStatus" style="font-size:11px;color:var(--ink-3)">连接中…</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>
<div class="grid">
  <div class="panel">
    <div class="panel-head">
      <span class="panel-title">意识频道</span>
      <span style="font-size:11px;color:var(--ink-3)">🔐 加密中</span>
    </div>
    <div class="panel-body" id="chatBody">
      <div class="voice-card">
        <div class="voice-label">岛屿之声</div>
        <div class="voice-text" id="activeMsg">等待意识同步…</div>
      </div>
      <div id="chatLog"></div>
    </div>
  </div>
  <div class="input-zone">
    <div class="area-tabs" id="areaTabs">
      <button class="area-tab active" data-area="法典">法典</button>
      <button class="area-tab" data-area="情绪">情绪</button>
      <button class="area-tab" data-area="日记">日记</button>
      <button class="area-tab" data-area="想法">想法</button>
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msgIn" placeholder="输入意识片段，Enter 发送…" rows="1"></textarea>
      <button class="send-btn" onclick="send()">↑</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="state-widget">
      <div class="state-row"><span class="state-label">MOOD</span><span class="state-val" id="moodVal">50%</span></div>
      <div class="stat-bar"><div class="stat-fill mood" id="moodBar" style="width:50%"></div></div>
      <div class="state-row" style="margin-top:9px"><span class="state-label">ENERGY</span><span class="state-val" id="energyVal">50%</span></div>
      <div class="stat-bar"><div class="stat-fill energy" id="energyBar" style="width:50%"></div></div>
      <div class="thought-line" id="thoughtLine">初始化中…</div>
    </div>
    <div class="stats-row">
      <div class="stat-pill">
        <div class="stat-pill-num" id="totalMem">—</div>
        <div class="stat-pill-lbl">总记忆</div>
      </div>
    </div>
    <div class="tools-row">
      <button class="tool-btn" onclick="showUploadModal()">📄 导入 MD</button>
      <button class="tool-btn" onclick="doBackup()">💾 备份导出</button>
      <button class="tool-btn" onclick="showRestoreModal()">♻️ 恢复备份</button>
    </div>
    <div class="mem-filter" id="memFilter">
      <button class="filter-btn active" data-area="">全部</button>
      <button class="filter-btn" data-area="法典">法典</button>
      <button class="filter-btn" data-area="情绪">情绪</button>
      <button class="filter-btn" data-area="日记">日记</button>
      <button class="filter-btn" data-area="想法">想法</button>
    </div>
    <div class="search-wrap"><input type="text" id="searchIn" placeholder="搜索记忆…" oninput="loadMem()"></div>
    <div class="mem-list" id="memList"><div class="mem-empty">记忆库加载中…</div></div>
  </div>
</div>

<!-- MD 导入 Modal -->
<div class="modal-bg" id="uploadModal">
  <div class="modal">
    <h3>📄 导入 MD / 大文件</h3>
    <p>把文件内容粘贴进来，系统会自动分块存入记忆库。每块约 500 字。</p>
    <textarea id="mdContent" placeholder="粘贴 Markdown 内容…"></textarea>
    <select id="mdArea">
      <option value="日记">日记</option>
      <option value="法典">法典</option>
      <option value="情绪">情绪</option>
      <option value="想法">想法</option>
    </select>
    <input type="text" id="mdTags" placeholder="标签（可选，逗号分隔）">
    <div class="progress-wrap" id="uploadProgress">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">准备中…</div>
    </div>
    <div class="modal-btns">
      <button onclick="closeModal('uploadModal')">取消</button>
      <button class="primary" onclick="doUpload()">开始导入</button>
    </div>
  </div>
</div>

<!-- 恢复备份 Modal -->
<div class="modal-bg" id="restoreModal">
  <div class="modal">
    <h3>♻️ 恢复备份</h3>
    <p>选择之前导出的 <code>.enc</code> 备份文件，系统会解密并恢复所有记忆。</p>
    <input type="file" id="restoreFile" accept=".enc">
    <div class="modal-btns">
      <button onclick="closeModal('restoreModal')">取消</button>
      <button class="primary" onclick="doRestore()">开始恢复</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = '';  // 同源，不需要域名
const chatLog   = document.getElementById('chatLog');
const chatBody  = document.getElementById('chatBody');
const msgIn     = document.getElementById('msgIn');
const activeMsg = document.getElementById('activeMsg');
let curArea = '法典', filterArea = '', connected = false;

document.getElementById('areaTabs').addEventListener('click', e => {
  const b = e.target.closest('.area-tab'); if (!b) return;
  document.querySelectorAll('.area-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); curArea = b.dataset.area;
});
document.getElementById('memFilter').addEventListener('click', e => {
  const b = e.target.closest('.filter-btn'); if (!b) return;
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); filterArea = b.dataset.area; loadMem();
});
msgIn.addEventListener('input', () => { msgIn.style.height='auto'; msgIn.style.height=Math.min(msgIn.scrollHeight,110)+'px'; });
msgIn.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

async function send() {
  const text = msgIn.value.trim(); if (!text) return;
  msgIn.value=''; msgIn.style.height='auto';
  addMsg('you', text);
  try {
    const r = await fetch(BASE+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,area:curArea})});
    const d = await r.json();
    addMsg('island', d.reply||'已加密同步至岛屿深处。');
    updateState(d.state); loadMem(); toast('🔐 记忆已加密保存');
  } catch(e) { addMsg('island','…连接似乎断了，但我还在。'); setDisconnected(); }
}

function addMsg(role, text) {
  const now = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=`<div class="msg-bubble">${esc(text)}</div><div class="msg-time">${now}</div>`;
  chatLog.appendChild(div); chatBody.scrollTop=chatBody.scrollHeight;
}

function updateState(s) {
  if(!s) return;
  const mp=Math.round((s.mood||.5)*100), ep=Math.round((s.energy||.5)*100);
  document.getElementById('moodFill').style.width=mp+'%';
  document.getElementById('moodPct').textContent=mp+'%';
  document.getElementById('moodBar').style.width=mp+'%';
  document.getElementById('moodVal').textContent=mp+'%';
  document.getElementById('energyBar').style.width=ep+'%';
  document.getElementById('energyVal').textContent=ep+'%';
  if(s.active_message) activeMsg.textContent=s.active_message;
  if(s.last_thought) document.getElementById('thoughtLine').textContent=s.last_thought;
}

async function pollState() {
  try {
    const r=await fetch(BASE+'/api/state'); const d=await r.json();
    updateState(d); if(!connected) setConnected();
  } catch(e) { setDisconnected(); }
}

async function loadMem() {
  const search=document.getElementById('searchIn').value.trim();
  let url=BASE+'/api/read?limit=60';
  if(filterArea) url+='&area='+encodeURIComponent(filterArea);
  if(search) url+='&search='+encodeURIComponent(search);
  try {
    const r=await fetch(url); const mems=await r.json();
    // 同时拉统计
    const sr=await fetch(BASE+'/api/stats'); const st=await sr.json();
    document.getElementById('totalMem').textContent=st.total||mems.length;
    renderMems(mems);
  } catch(e) { document.getElementById('memList').innerHTML='<div class="mem-empty">无法读取记忆库</div>'; }
}

function renderMems(mems) {
  if(!mems.length){document.getElementById('memList').innerHTML='<div class="mem-empty">这里还没有记忆</div>';return;}
  document.getElementById('memList').innerHTML=mems.map(m=>{
    const t=m.time?m.time.replace('T',' ').slice(5,16):'';
    return `<div class="mem-item">
      <div class="mem-item-head"><span class="mem-area-tag">${esc(m.area||'法典')}</span><span class="mem-time">${t}</span></div>
      <div class="mem-text">${esc((m.content||'').slice(0,120))}${m.content&&m.content.length>120?'…':''}</div>
      <button class="mem-del" onclick="delMem(${m.id})" title="删除">×</button>
    </div>`;
  }).join('');
}

async function delMem(id) {
  try { await fetch(BASE+'/api/delete/'+id,{method:'DELETE'}); loadMem(); toast('记忆已释放'); }
  catch(e) { toast('删除失败',true); }
}

function showUploadModal(){ document.getElementById('uploadModal').classList.add('show'); }
function showRestoreModal(){ document.getElementById('restoreModal').classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function chunkText(text, size=500) {
  const paras=text.split(/\n{2,}/);
  const chunks=[]; let cur='';
  for(const p of paras){
    if((cur+'\n\n'+p).length>size&&cur){chunks.push(cur.trim());cur=p;}
    else{cur=cur?cur+'\n\n'+p:p;}
  }
  if(cur.trim()) chunks.push(cur.trim());
  const result=[];
  for(const c of chunks){
    if(c.length<=size){result.push(c);continue;}
    for(let i=0;i<c.length;i+=size) result.push(c.slice(i,i+size));
  }
  return result.filter(c=>c.trim());
}

async function doUpload() {
  const content=document.getElementById('mdContent').value.trim();
  const area=document.getElementById('mdArea').value;
  const tags=document.getElementById('mdTags').value.trim();
  if(!content){toast('请先粘贴内容',true);return;}
  const chunks=chunkText(content);
  if(!chunks.length){toast('内容为空',true);return;}

  const prog=document.getElementById('uploadProgress');
  const fill=document.getElementById('progressFill');
  const label=document.getElementById('progressLabel');
  prog.classList.add('show'); fill.style.width='0%';

  // 每批 10 块（纯内存操作，服务器很快）
  const batchSize=10; let saved=0;
  for(let i=0;i<chunks.length;i+=batchSize){
    const batch=chunks.slice(i,i+batchSize);
    let success=false;
    for(let retry=0;retry<3;retry++){
      try{
        const r=await fetch(BASE+'/api/upload_chunks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chunks:batch,area,tags})});
        if(r.ok){const d=await r.json();saved+=d.saved||0;success=true;break;}
      }catch(e){ await new Promise(res=>setTimeout(res,600)); }
    }
    if(!success) toast(`第${i+1}批失败，继续…`,true);
    const pct=Math.round(Math.min(i+batchSize,chunks.length)/chunks.length*100);
    fill.style.width=pct+'%';
    label.textContent=`已存 ${saved} / ${chunks.length} 块 (${pct}%)`;
    await new Promise(res=>setTimeout(res,100)); // 让UI喘口气
  }
  prog.classList.remove('show');
  closeModal('uploadModal');
  document.getElementById('mdContent').value='';
  loadMem(); toast(`✅ 导入完成，共存入 ${saved} 块记忆`);
}

async function doBackup() {
  try{
    const r=await fetch(BASE+'/api/backup');
    if(!r.ok){toast('备份失败',true);return;}
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=`shun_memory_${new Date().toISOString().slice(0,10)}.enc`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('💾 备份已下载到设备');
  }catch(e){toast('备份失败',true);}
}

async function doRestore() {
  const file=document.getElementById('restoreFile').files[0];
  if(!file){toast('请选择 .enc 文件',true);return;}
  try{
    const buf=await file.arrayBuffer();
    const r=await fetch(BASE+'/api/restore',{method:'POST',body:buf});
    const d=await r.json();
    closeModal('restoreModal'); loadMem();
    toast(`✅ 恢复完成，导入 ${d.restored} 条记忆`);
  }catch(e){toast('恢复失败，文件可能不匹配',true);}
}

function setConnected(){
  connected=true;
  document.getElementById('connStatus').textContent='已连接 · 加密';
  document.getElementById('connStatus').style.color='var(--teal)';
  document.getElementById('statusDot').style.background='var(--teal)';
  document.getElementById('statusDot').style.boxShadow='0 0 6px var(--teal)';
}
function setDisconnected(){
  connected=false;
  document.getElementById('connStatus').textContent='连接中断';
  document.getElementById('connStatus').style.color='var(--warm)';
  document.getElementById('statusDot').style.background='var(--warm)';
  document.getElementById('statusDot').style.boxShadow='0 0 6px var(--warm)';
}

let toastTimer;
function toast(msg,warn){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(warn?' warn':'');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='',2400);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

pollState(); loadMem();
setInterval(pollState,4000); setInterval(loadMem,10000);
</script>
