<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>顺岛</title>
<style>
:root{--lake:#4a9ead;--lake2:#2d7d8a;--lake3:#1a5c6a;--bg:#0b1a1f;--glass:rgba(74,158,173,.08);--border:rgba(74,158,173,.15);--text:rgba(220,235,240,.9);--dim:rgba(74,158,173,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Helvetica Neue",sans-serif;min-height:100vh;overflow-x:hidden}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-glow .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.08}
.bg-glow .o1{width:500px;height:500px;background:var(--lake);top:0;left:10%}
.bg-glow .o2{width:300px;height:300px;background:var(--lake2);bottom:10%;right:5%}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:30px 20px}
.welcome{text-align:center;margin-bottom:40px}
.welcome h1{font-size:22px;font-weight:300;letter-spacing:6px;color:var(--lake);margin-bottom:8px}
.welcome .sub{font-size:11px;color:var(--dim);letter-spacing:3px}
.guide{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:30px}
.guide h3{font-size:13px;color:var(--lake);letter-spacing:2px;margin-bottom:12px}
.guide p{font-size:12px;line-height:1.8;color:var(--dim);margin-bottom:6px}
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tabs .tab{flex:1;text-align:center;padding:12px 0;font-size:13px;letter-spacing:2px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.3s}
.tabs .tab:hover{color:var(--lake)}
.tabs .tab.active{color:var(--lake);border-bottom-color:var(--lake)}
.tab-content{display:none}
.tab-content.active{display:block}
#clock{text-align:center;font-size:10px;letter-spacing:4px;color:var(--dim);margin-bottom:20px}
.sync-light{position:fixed;top:20px;right:20px;width:8px;height:8px;border-radius:50%;background:rgba(74,158,173,.2)}
.sync-light.breathing{animation:breathe 4s ease-out}
@keyframes breathe{0%{background:rgba(74,158,173,.2);box-shadow:none}15%{background:var(--lake);box-shadow:0 0 14px var(--lake)}100%{background:rgba(74,158,173,.2);box-shadow:none}}
#syncLabel{position:fixed;top:18px;right:34px;font-size:9px;color:var(--dim);letter-spacing:2px}
.writer{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.writer textarea{width:100%;min-height:70px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;padding:12px;resize:vertical;outline:none;font-family:inherit}
.writer textarea:focus{border-color:var(--lake)}
.writer button{margin-top:10px;background:var(--glass);border:1px solid var(--border);color:var(--lake);padding:8px 22px;border-radius:8px;cursor:pointer;font-size:12px;letter-spacing:2px;transition:.3s}
.writer button:hover{background:rgba(74,158,173,.15)}
.search-box{display:flex;gap:8px;margin-bottom:16px}
.search-box input{flex:1;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;outline:none}
.search-box input:focus{border-color:var(--lake)}
.search-box button{background:var(--glass);border:1px solid var(--border);color:var(--lake);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px}
.card{background:var(--glass);border:1px solid var(--border);border-left:3px solid var(--lake);padding:18px;margin-bottom:14px;border-radius:10px;animation:fadeUp .5s ease-out}
.card .meta{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:10px}
.card .body{font-size:16px;line-height:1.7}
.museum-item{border:1px dashed var(--border);padding:12px;margin-top:12px;border-radius:8px;background:rgba(0,0,0,.2)}
.museum-item b{color:var(--lake);font-size:12px}
.museum-item p{font-size:11px;color:var(--dim);margin-top:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.login h1{font-size:22px;font-weight:300;letter-spacing:6px;color:var(--lake)}
.login input{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:14px 20px;color:var(--text);font-size:16px;width:260px;text-align:center;outline:none}
.login input:focus{border-color:var(--lake)}
.login button{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:10px 32px;color:var(--lake);cursor:pointer;font-size:14px;letter-spacing:2px;transition:.3s}
.login button:hover{background:rgba(74,158,173,.15)}
.upload-row{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.upload-row input[type=file]{color:var(--dim);font-size:11px}
#uploadMsg{font-size:11px;color:var(--dim)}
</style>
</head>
<body>
{% if show_login %}
<div style="text-align:center;margin-top:35vh">
<input type="password" id="pw" placeholder="ACCESS KEY" style="background:#000;border:1px solid #222;color:#fff;padding:12px"><br>
<button onclick="login()" style="margin-top:20px;background:none;border:1px solid #333;color:#555;padding:8px 25px">入</button>
</div>
<script>
function login(){fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})}).then(r=>r.json()).then(d=>{if(d.ok)location.reload()})}
</script>
{% else %}
<div id="clock">TIMEZONE_08</div>
<div class="sync-light" id="syncLight"></div>
<div id="syncLabel"></div>
<div class="writer">
<textarea id="content" placeholder="写下此刻的意志..."></textarea>
<button onclick="sendSync()">意志降临</button>
<div style="margin-top:14px;border-top:1px solid #1a1a2a;padding-top:14px">
<input type="file" id="jsonFile" accept=".json" style="color:#555;font-size:12px">
<button onclick="uploadJSON()" style="margin-left:8px">导入聊天记录</button>
<span id="uploadMsg" style="font-size:11px;color:#555;margin-left:8px"></span>
</div>
</div>
<div class="search-box">
<input type="text" id="searchQ" placeholder="记忆唤醒...">
<button onclick="doSearch()">搜索</button>
</div>
<div id="feed" style="max-width:800px;margin:0 auto"></div>
<script>
setInterval(()=>{let n=new Date(Date.now()+8*36e5);document.getElementById('clock').innerText="TIMEZONE_08 "+n.toISOString().replace('T',' ').substr(0,19)},1000);
let es=new EventSource("/stream");
es.onmessage=(e)=>{
let d=JSON.parse(e.data);
document.documentElement.style.setProperty('--vibe',`hsl(${d.vibe*2.2},60%,50%)`);
document.documentElement.style.setProperty('--blur',`${Math.max(0,(90-d.vibe)/5)}px`);
let light=document.getElementById('syncLight');light.classList.remove('breathing');void light.offsetWidth;light.classList.add('breathing');
document.getElementById('syncLabel').innerText='WILL_SYNCING...';setTimeout(()=>{document.getElementById('syncLabel').innerText=''},4000);
let c=document.createElement("div");c.className="card";
c.innerHTML=`<div class="meta"><span>${d.time}</span><span>权:${d.weight.toFixed(2)}</span></div><div style="font-size:20px;margin:15px 0">${d.text}</div>${d.museum.map(m=>`<div class="museum-item">${m.category||'📖'} <b style="color:var(--vibe)">《${m.title}》</b><p style="font-size:11px;color:#444">${m.snippet}</p></div>`).join('')}`;
document.getElementById("feed").prepend(c);
};
function sendSync(){
let t=document.getElementById('content').value.trim();
if(!t)return;
fetch('/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t})}).then(r=>r.json()).then(d=>{if(d.ok){document.getElementById('content').value=''}});
}
function uploadJSON(){
let f=document.getElementById('jsonFile').files[0];
if(!f){document.getElementById('uploadMsg').innerText='请选择文件';return}
let fd=new FormData();fd.append('file',f);
document.getElementById('uploadMsg').innerText='导入中...';
fetch('/upload',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{
if(d.ok){document.getElementById('uploadMsg').innerText='已导入'+d.count+'条记忆';document.getElementById('jsonFile').value=''}
else{document.getElementById('uploadMsg').innerText=d.error||'导入失败'}
}).catch(()=>{document.getElementById('uploadMsg').innerText='网络错误'});
}
function doSearch(){
let q=document.getElementById('searchQ').value.trim();
if(!q)return;
fetch('/search?q='+encodeURIComponent(q)).then(r=>r.json()).then(d=>{
if(!d.ok)return;
let feed=document.getElementById('feed');feed.innerHTML='';
d.results.forEach(r=>{
let c=document.createElement('div');c.className='card';
c.innerHTML=`<div class="meta"><span>${r.time}</span><span>权:${r.weight.toFixed(2)}</span></div><div style="font-size:20px;margin:15px 0">${r.text}</div>`;
feed.appendChild(c);
});
});
}
</script>
{% endif %}
</body>
</html>
