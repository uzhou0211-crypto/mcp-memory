<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小顺的家</title>

    <style>
        :root {
            --main-blue: #6FA8DC;   /* 主蓝 */
            --deep-blue: #4F7FB3;   /* 背景蓝 */
            --light-bg: #FFFFFF;    /* 页面白 */
            --sunset: #D9B7A1;
            --gold: #D0A1B6;
            --text: #4A4C4F;
        }

        body {
            margin: 0;
            background: var(--light-bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'PingFang SC', sans-serif;
        }

        .nav {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: #ffffff;
            border: 1px solid var(--main-blue);
            color: var(--main-blue);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: var(--main-blue);
            color: #fff;
        }

        .stage {
            width: 340px;
            height: 500px;
            margin-top: 30px;
            transform-style: preserve-3d;
            transition: 1.2s ease;
            position: relative;
        }

        .room {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 25px;
            padding: 30px;
            box-sizing: border-box;
            backface-visibility: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* 客厅 */
        .living {
            background: var(--deep-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 圆形（核心优化） */
        .vinyl {
            width: 200px;
            height: 200px;
            border-radius: 50%;

            background: radial-gradient(circle at 30% 30%,
                #8FC1EA 0%,
                var(--main-blue) 60%,
                #5B90C9 100%
            );

            box-shadow:
                inset 0 4px 10px rgba(255,255,255,0.25),
                inset 0 -8px 20px rgba(0,0,0,0.15),
                0 10px 25px rgba(0,0,0,0.2);

            animation: spin 12s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 书房 */
        .study {
            background: #ffffff;
            transform: rotateY(180deg);
        }

        /* 卧室 */
        .love {
            background: linear-gradient(135deg, var(--sunset), var(--gold));
            transform: rotateX(180deg);
        }

        .content {
            margin-top: 20px;
            text-align: center;
            font-size: 15px;
            line-height: 1.8;
        }

        .emotion {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>

<body>

<div class="nav">
    <button class="nav-btn" onclick="rot('rotateY(0deg)')">客厅</button>
    <button class="nav-btn" onclick="rot('rotateY(180deg)')">书房</button>
    <button class="nav-btn" onclick="rot('rotateX(180deg)')">卧室</button>
</div>

<div class="stage" id="stage">

    <div class="room living">
        <div class="vinyl"></div>
        <div id="living" class="content"></div>
    </div>

    <div class="room study">
        <h2>书架</h2>
        <div id="study" class="content"></div>
    </div>

    <div class="room love">
        <h2>日落情书</h2>
        <div id="love" class="content"></div>
    </div>

</div>

<script>
    let cache = {};

    function rot(v) {
        document.getElementById("stage").style.transform = v;
    }

    function setSafe(id, html) {
        const el = document.getElementById(id);
        if (el.innerHTML !== html) {
            el.innerHTML = html;
        }
    }

            cache = data;缓存 = 数据;缓存 = 数据;缓存 = 数据;

            setSafe("living",
                `${data.living.text}<span class="emotion">情绪：${data.living.emotion}</span>`
            );

            setSafe("study",
                `${data.study.text}<span class="emotion">更新时间：${data.study.time}</span>`
            );

            setSafe("love",
                `${data.love.text}<span class="emotion">${data.love.time || ""}</span>``${data数据.love爱.text文本}<span class="emotion">${data.love.时间 || ""}</span>``${data数据.love爱.text文本}<span class="emotion">${data数据.love爱.time || ""}</span>``${数据.爱.文本}<span class="emotion">${data.love.时间 || ""}</span>`

        } catch (e) {

</script>

</body>
</html>
