<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文岛</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');
:root{
  --ink:#1c1a18;--ink-2:#4a4640;--ink-3:#9a9490;
  --paper:#faf8f4;--paper-2:#f3f0ea;--paper-3:#ece8e0;
  --warm:#c96442;--warm-soft:rgba(201,100,66,.15);
  --teal:#4a8a80;--teal-soft:rgba(74,138,128,.15);
  --blue:#3a6ea8;--blue-soft:rgba(58,110,168,.15);
  --border:rgba(28,26,24,.1);--r:12px;--r-sm:8px;
  --hl-yellow:rgba(255,220,50,.45);
  --hl-pink:rgba(255,100,150,.35);
  --hl-blue:rgba(80,160,255,.35);
}
body.dark{
  --ink:#ddd8d0;--ink-2:#a8a098;--ink-3:#686060;
  --paper:#161412;--paper-2:#1e1c18;--paper-3:#262420;
  --warm:#e08060;--warm-soft:rgba(201,100,66,.2);
  --teal:#60a898;--teal-soft:rgba(74,138,128,.2);
  --blue:#5888c8;--blue-soft:rgba(58,110,168,.2);
  --border:rgba(221,216,208,.1);
  --hl-yellow:rgba(255,220,50,.3);
  --hl-pink:rgba(255,100,150,.25);
  --hl-blue:rgba(80,160,255,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans SC',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.7;transition:background .3s,color .3s}

/* lock */
#lockScreen{position:fixed;inset:0;background:var(--paper);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#lockScreen h2{font-family:'Noto Serif SC',serif;font-size:22px;letter-spacing:.05em}
#lockInput{padding:11px 18px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--paper-2);color:var(--ink);font-family:inherit;font-size:15px;outline:none;width:240px;text-align:center;transition:border-color .2s}
#lockInput:focus{border-color:var(--teal)}
#lockBtn{padding:14px 40px;background:var(--teal);border:none;border-radius:var(--r-sm);color:#fff;font-family:inherit;font-size:16px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-width:140px;min-height:52px;transition:background .2s;display:block}
#lockBtn:hover{background:#3a7a70}
#lockErr{font-size:12px;color:var(--warm);min-height:18px}

/* layout */
.app{display:flex;flex-direction:column;height:100%}
header{padding:10px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--paper-2);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;flex-wrap:wrap}
.logo{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;white-space:nowrap;color:var(--ink)}
.book-info{font-size:12px;color:var(--ink-3);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.hdr-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-btn{padding:5px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--ink-2);font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;touch-action:manipulation}
.hdr-btn:hover{background:var(--teal-soft);border-color:var(--teal);color:var(--teal)}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:transparent;font-size:14px;cursor:pointer;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation;flex-shrink:0}
.icon-btn:hover{background:var(--teal-soft);border-color:var(--teal)}
.font-size-label{font-size:11px;color:var(--ink-3);min-width:32px;text-align:center}

.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* drop zone */
#dropZone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;cursor:pointer;transition:background .2s;border-right:1px solid var(--border)}
#dropZone:hover,#dropZone.drag{background:var(--teal-soft)}
#dropZone .dz-icon{font-size:52px}
#dropZone h3{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--ink-2)}
#dropZone p{font-size:13px;color:var(--ink-3);text-align:center;line-height:1.9}
#dropZone .tip{font-size:11px;color:var(--ink-3);background:var(--paper-2);padding:8px 16px;border-radius:var(--r-sm);border:1px solid var(--border);text-align:center}
.upload-btn{padding:10px 28px;background:var(--teal);border:none;border-radius:var(--r-sm);color:#fff;font-family:inherit;font-size:14px;cursor:pointer;touch-action:manipulation;transition:background .2s}
.upload-btn:hover{background:#3a7a70}
#fileInput{display:none}

/* progress */
#loadProgress{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:40px;border-right:1px solid var(--border)}
#loadProgress.show{display:flex}
.prog-bar{height:4px;background:var(--paper-3);border-radius:2px;overflow:hidden;width:220px}
.prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
#progText{font-size:13px;color:var(--ink-3)}

/* reader */
#readerWrap{flex:1;display:none;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
#readerWrap.show{display:flex}
#reader{flex:1;overflow-y:auto;padding:32px 52px;font-family:'Inter','Noto Serif SC',serif;font-size:16px;color:var(--ink);line-height:1.9;user-select:text;-webkit-user-select:text}
#reader::-webkit-scrollbar{width:4px}
#reader::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#reader p{margin-bottom:.9em}
#reader h1,#reader h2,#reader h3{font-family:'Noto Serif SC',serif;margin:1.4em 0 .5em;color:var(--ink)}
#reader h1{font-size:1.35em}#reader h2{font-size:1.15em}#reader h3{font-size:1.05em}

/* highlights */
.hl-yellow{background:var(--hl-yellow);border-radius:2px;cursor:pointer}
.hl-pink{background:var(--hl-pink);border-radius:2px;cursor:pointer}
.hl-blue{background:var(--hl-blue);border-radius:2px;cursor:pointer}
.hl-yellow:hover,.hl-pink:hover,.hl-blue:hover{filter:brightness(.9)}

/* selection toolbar */
#selToolbar{position:fixed;display:none;background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;gap:6px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;align-items:center;flex-wrap:wrap}
#selToolbar.show{display:flex}
.hl-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;flex-shrink:0}
.hl-btn:hover{transform:scale(1.2)}
.hl-btn.yellow{background:#ffd832;border-color:#e6c020}
.hl-btn.pink{background:#ff6496;border-color:#e04080}
.hl-btn.blue{background:#50a0ff;border-color:#3080e0}
.sel-note-btn{padding:3px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--ink-2);font-family:inherit;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.sel-note-btn:hover{background:var(--teal-soft);border-color:var(--teal);color:var(--teal)}
.sel-divider{width:1px;height:18px;background:var(--border)}

/* sidebar */
.sidebar{width:320px;display:flex;flex-direction:column;overflow:hidden;background:var(--paper-2);flex-shrink:0}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:10px 6px;text-align:center;font-size:12px;color:var(--ink-3);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s;border-bottom:2px solid transparent}
.stab.active{color:var(--teal);border-bottom-color:var(--teal)}
.stab:hover{background:var(--teal-soft)}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-panel.active{display:flex}

/* note panel */
.note-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.note-body::-webkit-scrollbar{width:3px}
.note-body::-webkit-scrollbar-thumb{background:var(--border)}
.field-label{font-size:11px;color:var(--ink-3);margin-bottom:4px;letter-spacing:.04em}
.note-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
.note-input:focus{border-color:var(--teal)}
.quote-display{padding:9px 11px;background:var(--blue-soft);border:1px solid rgba(58,110,168,.2);border-radius:var(--r-sm);font-size:12.5px;color:var(--ink-2);font-style:italic;min-height:48px;line-height:1.6;word-break:break-word}
.note-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-family:inherit;font-size:13px;outline:none;resize:none;min-height:80px;max-height:160px;line-height:1.6;transition:border-color .15s}
.note-textarea:focus{border-color:var(--teal)}
.subject-row{display:flex;gap:5px;flex-wrap:wrap}
.subject-tag{padding:3px 9px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--ink-3);font-family:inherit;transition:all .15s;touch-action:manipulation}
.subject-tag.active{background:var(--teal);border-color:var(--teal);color:#fff}
.submit-btn{width:100%;padding:10px;background:var(--teal);border:none;border-radius:var(--r-sm);color:#fff;font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;transition:background .2s;touch-action:manipulation}
.submit-btn:hover{background:#3a7a70}
.submit-btn:disabled{background:var(--paper-3);color:var(--ink-3);cursor:not-allowed}
.hint{font-size:11px;color:var(--ink-3);padding:7px 9px;background:var(--paper);border-radius:var(--r-sm);border-left:2px solid var(--teal);line-height:1.6}

/* highlights list */
.hl-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.hl-list::-webkit-scrollbar{width:3px}
.hl-list::-webkit-scrollbar-thumb{background:var(--border)}
.hl-item{padding:9px 11px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--paper);font-size:12px;position:relative}
.hl-item-color{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.hl-item-text{font-style:italic;color:var(--ink-2);line-height:1.6;margin-bottom:4px;word-break:break-word}
.hl-item-note{color:var(--ink);font-size:11.5px;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.hl-item-meta{font-size:10px;color:var(--ink-3);margin-top:4px;display:flex;align-items:center;gap:6px}
.hl-del{border:none;background:transparent;color:var(--ink-3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;transition:all .15s;touch-action:manipulation}
.hl-del:hover{background:#fee;color:#c0392b}
.no-hl{text-align:center;padding:24px;color:var(--ink-3);font-size:12px;font-style:italic}

/* export panel */
.export-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.export-btn{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--ink-2);font-family:inherit;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;touch-action:manipulation}
.export-btn:hover{background:var(--teal-soft);border-color:var(--teal);color:var(--teal)}
.export-desc{font-size:11px;color:var(--ink-3);line-height:1.6;padding:8px 10px;background:var(--paper);border-radius:var(--r-sm)}

/* mobile */
.mobile-fab{display:none;position:fixed;bottom:20px;right:20px;z-index:100;width:52px;height:52px;border-radius:50%;background:var(--teal);border:none;color:#fff;font-size:22px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(74,138,128,.4);touch-action:manipulation}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end}
.drawer-bg.show{display:flex}
.drawer{background:var(--paper);border-radius:12px 12px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.drawer-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 10px}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.warn{background:var(--warm)}
#toast.ok{background:var(--teal)}

@media(max-width:750px){
  .sidebar{display:none}
  .mobile-fab{display:flex!important}
  #reader{padding:18px 20px}
}
</style>
</head>

<input type="file" id="fileInput" accept=".txt,.pdf,.epub" onchange="handleFile(this.files[0])">
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──────────────────────────────────────────────────────────────────
let TOKEN = sessionStorage.getItem('island_token') || '';
let currentSubject = '';
let currentHL = null;  // {text, color, range}
let highlights = [];   // [{id, text, color, note, subject, time}]
let hlFilter = '';
let currentPaper = '';
let isDark = localStorage.getItem('paperDark') === '1';
let fontSize = parseInt(localStorage.getItem('paperFont') || '16');

// ── Lock ───────────────────────────────────────────────────────────────────
function doUnlock() {
  const val = document.getElementById('lockInput').value.trim();
  if (!val) return;
  fetch('/api/state?token=' + encodeURIComponent(val))
    .then(r => {
      if (r.ok) {
        TOKEN = val;
        sessionStorage.setItem('island_token', val);
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('appMain').style.display = 'flex';
        applyDark(); applyFont();
        loadAllNotes();
      } else {
        document.getElementById('lockErr').textContent = '\u5bc6\u7801\u9519\u8bef';
      }
    }).catch(() => { document.getElementById('lockErr').textContent = '\u8fde\u63a5\u5931\u8d25'; });
}
document.getElementById('lockInput').addEventListener('keydown', e => { if(e.key==='Enter') doUnlock(); });
document.getElementById('lockBtn').addEventListener('click', function(e) { e.preventDefault(); doUnlock(); });
document.getElementById('lockBtn').addEventListener('touchend', function(e) { e.preventDefault(); e.stopPropagation(); doUnlock(); });


if (TOKEN) {
  fetch('/api/state?token=' + encodeURIComponent(TOKEN))
    .then(r => {
      if (r.ok) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('appMain').style.display = 'flex';
        applyDark(); applyFont();
        loadAllNotes();
      } else { TOKEN = ''; sessionStorage.removeItem('island_token'); }
    }).catch(() => {});
}

// ── Dark / Font ────────────────────────────────────────────────────────────
function applyDark() {
  document.body.classList.toggle('dark', isDark);
  const btn = document.getElementById('darkBtn');
  if (btn) btn.textContent = isDark ? '\u2600\ufe0f' : '\u263e';
}
function toggleDark() {
  isDark = !isDark;
  localStorage.setItem('paperDark', isDark ? '1' : '0');
  applyDark();
}
function applyFont() {
  document.getElementById('reader').style.fontSize = fontSize + 'px';
  document.getElementById('fontLabel').textContent = fontSize;
}
function changeFontSize(d) {
  fontSize = Math.min(28, Math.max(12, fontSize + d));
  localStorage.setItem('paperFont', fontSize);
  applyFont();
}

// ── File loading ───────────────────────────────────────────────────────────
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

async function handleFile(file) {
  if (!file) return;
  currentPaper = file.name.replace(/\.[^.]+$/, '');
  document.getElementById('paperInfo').textContent = currentPaper;
  document.getElementById('paperTitle').value = currentPaper;
  document.getElementById('paperTitleM').value = currentPaper;
  highlights = [];
  renderHLList();

  dz.style.display = 'none';
  document.getElementById('loadProgress').classList.add('show');
  document.getElementById('readerWrap').classList.remove('show');

  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') await loadPDF(file);
  else if (ext === 'epub') await loadEPUB(file);
  else await loadTXT(file);

  document.getElementById('loadProgress').classList.remove('show');
  document.getElementById('readerWrap').classList.add('show');
  applyFont();
}

async function loadTXT(file) {
  const text = await file.text();
  renderText(text);
}

async function loadPDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  const total = pdf.numPages;
  let all = '';
  for (let i = 1; i <= total; i++) {
    const page = await pdf.getPage(i);
    const ct = await page.getTextContent();
    all += ct.items.map(x => x.str).join(' ') + '\n\n';
    setProgress(Math.round(i/total*100), '\u7b2c ' + i + ' / ' + total + ' \u9875');
    if (i % 10 === 0) await tick();
  }
  renderText(all);
}

async function loadEPUB(file) {
  setProgress(10, 'EPUB \u89e3\u6790\u4e2d\u2026');
  const buf = await file.arrayBuffer();
  let zip;
  try { zip = await JSZip.loadAsync(buf); }
  catch(e) { showError('\u6587\u4ef6\u635f\u574f\uff0c\u8bf7\u7528 Calibre \u91cd\u65b0\u5bfc\u51fa'); return; }

  const keys = Object.keys(zip.files);
  setProgress(25, '\u67e5\u627e\u76ee\u5f55\u2026');

  let ordered = [];
  const opfKey = keys.find(k => k.endsWith('.opf'));
  if (opfKey) {
    const opfText = await zip.file(opfKey).async('text');
    const opfDir = opfKey.includes('/') ? opfKey.split('/').slice(0,-1).join('/') + '/' : '';
    const idHref = {};
    let m;
    const r1 = /id=["']([^"']+)["'][^>]*href=["']([^"']+)["']/g;
    while((m=r1.exec(opfText))!==null) idHref[m[1]] = m[2];
    const r2 = /idref=["']([^"']+)["']/g;
    while((m=r2.exec(opfText))!==null) {
      const href = idHref[m[1]];
      if (href) {
        const full = opfDir + href.split('#')[0];
        if (zip.file(full)) ordered.push(full);
      }
    }
  }
  if (!ordered.length) {
    ordered = keys.filter(k => !zip.files[k].dir && (k.endsWith('.html')||k.endsWith('.xhtml'))).sort();
  }

  setProgress(40, '\u52a0\u8f7d\u7ae0\u8282\u2026');
  const reader = document.getElementById('reader');
  reader.innerHTML = '';
  for (let i = 0; i < ordered.length; i++) {
    const zf = zip.file(ordered[i]);
    if (!zf) continue;
    const text = await zf.async('text');
    const tmp = document.createElement('div');
    tmp.innerHTML = text;
    tmp.querySelectorAll('script,style,link,head,meta,img,svg,figure').forEach(el=>el.remove());
    const body = tmp.querySelector('body') || tmp;
    if (!body.textContent.trim()) continue;
    const chunk = document.createElement('div');
    chunk.style.marginBottom = '1.5em';
    body.textContent.split(/\n+/).filter(p=>p.trim()).forEach(p => {
      const el = document.createElement('p');
      el.textContent = p.trim();
      chunk.appendChild(el);
    });
    reader.appendChild(chunk);
    setProgress(40 + Math.round((i+1)/ordered.length*60), (i+1)+'/'+ordered.length+' \u7ae0');
    if (i % 5 === 0) await tick();
  }
  if (!reader.textContent.trim()) showError('\u89e3\u6790\u5931\u8d25\uff0c\u8bf7\u8f6c TXT \u518d\u8bd5');
}

function renderText(text) {
  const reader = document.getElementById('reader');
  let paras = text.split(/\n{2,}/).filter(p=>p.trim());
  if (paras.length < 3) paras = text.split(/\n/).filter(p=>p.trim());
  if (!paras.length) paras = [text];
  reader.innerHTML = paras.map(p => '<p>' + esc(p.trim()) + '</p>').join('');
}

function setProgress(pct, label) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = label;
}
function showError(msg) {
  document.getElementById('loadProgress').classList.remove('show');
  document.getElementById('readerWrap').classList.add('show');
  document.getElementById('reader').innerHTML = '<p style="text-align:center;padding:40px;color:var(--warm)">' + esc(msg) + '</p>';
}
function tick() { return new Promise(r => setTimeout(r, 0)); }

// ── Text selection & toolbar ───────────────────────────────────────────────
let lastSelection = null;

function onTextSelect(e) {
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) {
      hideToolbar(); return;
    }
    const text = sel.toString().trim();
    if (text.length < 2) { hideToolbar(); return; }
    lastSelection = {text, range: sel.getRangeAt(0).cloneRange()};

    const rect = sel.getRangeAt(0).getBoundingClientRect();
    const tb = document.getElementById('selToolbar');
    tb.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
    tb.style.top = (rect.top + window.scrollY - 46) + 'px';
    tb.classList.add('show');
  }, 50);
}

document.addEventListener('mousedown', e => {
  if (!e.target.closest('#selToolbar')) hideToolbar();
});

function hideToolbar() {
  document.getElementById('selToolbar').classList.remove('show');
}

function applyHL(color) {
  if (!lastSelection) return;
  const {text, range} = lastSelection;

  // Wrap in highlight span
  const span = document.createElement('span');
  span.className = 'hl-' + color;
  span.dataset.hlId = Date.now().toString();
  span.dataset.hlColor = color;
  span.title = '\u70b9\u51fb\u5220\u9664';
  span.onclick = function() { removeHL(this); };
  try {
    range.surroundContents(span);
  } catch(e) {
    // Range spans multiple elements, just record it
    const p = document.createElement('p');
    p.textContent = text;
    span.appendChild(p);
  }

  const hl = {id: span.dataset.hlId, text, color, note: '', subject: currentSubject, time: new Date().toISOString()};
  highlights.push(hl);
  renderHLList();
  hideToolbar();
  window.getSelection().removeAllRanges();

  // Auto-fill quote
  document.getElementById('quoteDisplay').textContent = text;
  document.getElementById('quoteDisplayM').textContent = text;
  currentHL = hl;
  toast('\u5df2\u6807\u8bb0' + (color==='\u9ec4'?'\u9ec4':color==='\u7c89'?'\u7c99':'\u84dd') + '\u8272\u9ad8\u4eae');
}

function addToNote() {
  if (!lastSelection) return;
  document.getElementById('quoteDisplay').textContent = lastSelection.text;
  document.getElementById('quoteDisplayM').textContent = lastSelection.text;
  currentHL = {text: lastSelection.text, color: '', note: '', subject: currentSubject};
  hideToolbar();
  document.getElementById('noteText').focus();
  switchTab('note');
}

function removeHL(span) {
  const id = span.dataset.hlId;
  highlights = highlights.filter(h => h.id !== id);
  const text = document.createTextNode(span.textContent);
  span.parentNode.replaceChild(text, span);
  renderHLList();
  toast('\u5df2\u5220\u9664\u9ad8\u4eae');
}

// ── Sidebar tabs ───────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.stab').forEach((t,i) => {
    t.classList.toggle('active', ['note','highlights','export'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'tab-'+name);
  });
  if (name === 'export') loadAllNotes();
}

// ── Subject tags ───────────────────────────────────────────────────────────
document.getElementById('subjectRow').addEventListener('click', e => {
  const b = e.target.closest('.subject-tag'); if(!b) return;
  document.querySelectorAll('#subjectRow .subject-tag').forEach(t => t.classList.remove('active'));
  b.classList.add('active');
  currentSubject = b.dataset.s;
});

// ── HL list ────────────────────────────────────────────────────────────────
function filterHL(btn) {
  document.querySelectorAll('[data-f]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  hlFilter = btn.dataset.f;
  renderHLList();
}

function renderHLList() {
  const list = document.getElementById('hlList');
  const filtered = hlFilter ? highlights.filter(h => h.color === hlFilter) : highlights;
  if (!filtered.length) { list.innerHTML = '<div class="no-hl">\u8fd8\u6ca1\u6709\u9ad8\u4eae</div>'; return; }
  const colorMap = {yellow:'#ffd832', pink:'#ff6496', blue:'#50a0ff'};
  list.innerHTML = filtered.map(h => {
    return '<div class="hl-item">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      + '<span class="hl-item-color" style="background:' + (colorMap[h.color]||'#999') + '"></span>'
      + '<span style="font-size:10px;color:var(--ink-3)">' + esc(h.subject||'\u65e0\u5206\u7c7b') + '</span>'
      + '<button class="hl-del" onclick="removeHLById(' + JSON.stringify(h.id) + ')" title="\u5220\u9664">&#10005;</button>'
      + '</div>'
      + '<div class="hl-item-text">' + esc(h.text.slice(0,120)) + (h.text.length>120?'\u2026':'') + '</div>'
      + (h.note ? '<div class="hl-item-note">' + esc(h.note) + '</div>' : '')
      + '<div class="hl-item-meta">' + (h.time?h.time.slice(0,16).replace('T',' '):'') + '</div>'
      + '</div>';
  }).join('');
}

function removeHLById(id) {
  const span = document.querySelector('[data-hl-id="' + id + '"]');
  if (span) removeHL(span);
  else { highlights = highlights.filter(h => h.id !== id); renderHLList(); }
}

// ── Submit note ────────────────────────────────────────────────────────────
async function submitNote(isMobile) {
  const title = (isMobile ? document.getElementById('paperTitleM') : document.getElementById('paperTitle')).value.trim();
  const quote = (isMobile ? document.getElementById('quoteDisplayM') : document.getElementById('quoteDisplay')).textContent.trim();
  const note  = (isMobile ? document.getElementById('noteTextM')     : document.getElementById('noteText')).value.trim();
  if (!quote && !note) { toast('\u8bf7\u5148\u5212\u9009\u6216\u5199\u4e0b\u6279\u6ce8', true); return; }

  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '\u4fdd\u5b58\u4e2d\u2026'; }

  const parts = [];
  if (title) parts.push('\u300a' + title + '\u300b');
  if (quote && quote !== '\u5212\u9009\u6587\u5b57\u540e\u81ea\u52a8\u586b\u5165\u2026') parts.push('\u300c' + quote + '\u300d');
  if (note) parts.push('\u6279\u6ce8\uff1a' + note);
  if (currentSubject) parts.push('\u5b66\u79d1\uff1a' + currentSubject);
  const content = parts.join('\n');

  // Update HL note if exists
  if (currentHL && currentHL.id) {
    const hl = highlights.find(h => h.id === currentHL.id);
    if (hl) { hl.note = note; hl.subject = currentSubject; renderHLList(); }
  }

  try {
    const r = await fetch('/api/book-note', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Token': TOKEN},
      body: JSON.stringify({quote, note, book: title, area: '\u8bba\u6587', subject: currentSubject})
    });
    if (r.ok) {
      if (isMobile) { document.getElementById('noteTextM').value = ''; closeDrawer(); }
      else { document.getElementById('noteText').value = ''; document.getElementById('quoteDisplay').textContent = '\u5212\u9009\u6587\u5b57\u540e\u81ea\u52a8\u586b\u5165\u2026'; }
      currentHL = null;
      toast('\u5df2\u5b58\u5165\u8bba\u6587\u5c9b', 'ok');
    } else { toast('\u4fdd\u5b58\u5931\u8d25', true); }
  } catch(e) { toast('\u7f51\u7edc\u9519\u8bef', true); }

  if (btn) { btn.disabled = false; btn.textContent = '\u5b58\u5165\u8bba\u6587\u5c9b \u2192'; }
}

// ── Export ─────────────────────────────────────────────────────────────────
async function loadAllNotes() {
  try {
    const r = await fetch('/api/read?area=' + encodeURIComponent('\u8bba\u6587') + '&limit=100&token=' + encodeURIComponent(TOKEN));
    if (!r.ok) return;
    const mems = await r.json();
    const el = document.getElementById('allNotesList');
    if (!mems.length) { el.innerHTML = '<div class="no-hl">\u8fd8\u6ca1\u6709\u8bba\u6587\u6279\u6ce8</div>'; return; }
    el.innerHTML = mems.map(m => {
      const t = m.time ? m.time.slice(0,16).replace('T',' ') : '';
      return '<div class="hl-item"><div class="hl-item-text">' + esc(m.content.slice(0,100)) + (m.content.length>100?'\u2026':'') + '</div><div class="hl-item-meta">' + t + '</div></div>';
    }).join('');
  } catch(e) {}
}

function getExportData() {
  return highlights.map(h =>
    '## ' + (h.color||'') + ' ' + (h.subject||'') + '\n\n> ' + h.text + (h.note ? '\n\n' + h.note : '') + '\n\n---\n'
  ).join('\n');
}

function exportMD() {
  if (!highlights.length) { toast('\u8fd8\u6ca1\u6709\u5212\u7ebf', true); return; }
  const content = '# ' + currentPaper + '\n\n' + getExportData();
  downloadFile(currentPaper + '_notes.md', content, 'text/markdown');
}
function exportTXT() {
  if (!highlights.length) { toast('\u8fd8\u6ca1\u6709\u5212\u7ebf', true); return; }
  const content = highlights.map(h => '[' + h.color + '] ' + h.text + (h.note?'\n\u6279\u6ce8\uff1a'+h.note:'')).join('\n\n---\n\n');
  downloadFile(currentPaper + '_notes.txt', content, 'text/plain');
}
function exportJSON() {
  if (!highlights.length) { toast('\u8fd8\u6ca1\u6709\u5212\u7ebf', true); return; }
  downloadFile(currentPaper + '_notes.json', JSON.stringify(highlights, null, 2), 'application/json');
}
function downloadFile(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  toast('\u5df2\u4e0b\u8f7d');
}

// ── Drawer ─────────────────────────────────────────────────────────────────
function openDrawer()  { document.getElementById('drawerBg').classList.add('show'); }
function closeDrawer() { document.getElementById('drawerBg').classList.remove('show'); }

// ── Utils ──────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === true ? ' warn' : type === 'ok' ? ' ok' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2600);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
